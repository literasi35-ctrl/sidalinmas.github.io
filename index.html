<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIDALMAS - Kabupaten Malang</title>
  
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/5/53/Linmas_Logo.png" type="image/x-icon">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
    }
    .iframe-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Gaya Tampilan Loading Progresif */
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.1rem;
      font-weight: 500;
      color: #2c3e50;
      z-index: 10;
      text-align: center;
    }
    .spinner {
      margin: 0 auto 10px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #0056b3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div>Memuat Sistem SIDALMAS...</div>
    </div>
    
    <iframe 
      src="https://script.google.com/macros/s/AKfycbxDI-UESilWwdkiPbkQa-cVJ7nI3as8gLYaYbHX64T7R-_ECRe_MaTJoiHvSZ5R1pBn2w/exec" 
      title="SIDALMAS Web App"
      onload="document.getElementById('loader').style.display='none';"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
